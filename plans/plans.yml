plans:
  - name: Open Access (No Authentication)
    description: >-
      The WMO World Weather Information Service (WWIS) JSON API and the WIS2 Global
      Discovery Catalogue are openly accessible without any API key or registration.
      WWIS city weather and climatological data is free to use with attribution.
      The WIS2 Global Discovery Catalogue supports unauthenticated read-only queries
      against the OGC API - Records endpoint.
    apis:
      - world-weather-information-service-api
      - wis2-global-discovery-catalogue-api
    url: https://worldweather.wmo.int/en/dataguide.html

  - name: Free Registration (Token Required)
    description: >-
      The WMO Hydrological Observing System (WHOS) APIs require a personal access
      token obtained via free registration at the WHOS registration portal. There is
      no cost associated with registration. The token is used as a path parameter in
      all WHOS endpoint URLs.
    apis:
      - whos-hydrological-api
    url: https://whos.geodab.eu/gs-service/whos/registration.html

  - name: Public Read-Only (OSCAR)
    description: >-
      OSCAR/Surface GET endpoints for station search and metadata retrieval are
      publicly accessible without authentication. Write operations (XML uploads for
      station updates) require an authorized WIGOS Focal Point account with a security
      token issued by WMO.
    apis:
      - oscar-surface-api
    url: https://oscar.wmo.int/surface/

  - name: Public MQTT Subscription (WIS2 Global Broker)
    description: >-
      The WIS2 Global Broker MQTTS service provides public read-only access using
      shared credentials (username: everyone, password: everyone). Any MQTT client
      can subscribe to WIS2 topic hierarchy topics to receive real-time notification
      messages for global weather, climate, and hydrological data.
    apis:
      - wis2-global-broker-mqtt-api
    url: https://community.wmo.int/site/knowledge-hub/programmes-and-initiatives/wmo-information-system-wis/wis2-overview
